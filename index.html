<!DOCTYPE html>
<html lang="pt-BR">
<h3>Aguardando Convite...</h3>
<script>
 const API_URL = "https://script.google.com/macros/s/AKfycbzIw98kEl0C_Zy1IwK6ATg7lH_41IyZPbeORMIimR9SGG8V7WHkxkLbxDOo4n5gwK9O/exec";
 // Captura o ?id= da URL da página
 const urlParams = new URLSearchParams(window.location.search);
 const idFamilia = urlParams.get('id');
 let listaConvidados = [];
 window.addEventListener('DOMContentLoaded', () => {
 if (!idFamilia) {
 document.body.innerHTML = "<h1>Convite Inválido</h1><p>Por favor, utilize olink completo enviado pelos noivos.</p>";
 return;
 }
 carregarConvidados();
 });
 function carregarConvidados() {
 fetch(`${API_URL}?id=${idFamilia}`)
 .then(res => res.json())
 .then(data => {
 listaConvidados = data;
 renderizarFormulario();
 })
 .catch(err => console.error("Erro ao buscar dados:", err));
 }
 function renderizarFormulario() {
 if (listaConvidados.length === 0) {
 document.body.innerHTML = "<h1>Família não encontrada</h1>";
 return;
 }
 let html = "<h2>Confirmação de Presença</h2><form id='rsvp-form'>";
 listaConvidados.forEach((c, i) => {
 const checked = c.confirmado === "Sim" ? "checked" : "";
 html += `
 <div style='margin-bottom: 10px;'>
 <label>
 <input type='checkbox' id='chk-${i}' ${checked}> ${c.nome}
 </label>
 </div>
 `;
 });
 html += "<button type='button' onclick='enviarRSVP()'>Confirmar Presença</button></form>";
 document.body.innerHTML = html;
 }
 function enviarRSVP() {
 // Atualiza a estrutura local baseado nos checkboxes marcados
 listaConvidados.forEach((c, i) => {
 const chk = document.getElementById(`chk-${i}`);
 c.confirmado = chk.checked ? "Sim" : "Não";
 });
 // Envia as atualizações via POST de forma assíncrona
 fetch(API_URL, {
 method: "POST",
 mode: "no-cors", // Evita problemas de CORS no redirecionamento do Apps Script
 headers: { "Content-Type": "application/json" },
 body: JSON.stringify(listaConvidados)
 })
 .then(() => {
 document.body.innerHTML = "<h2>Obrigado!</h2><p>Sua resposta foi salva com sucesso.</p>";
 })
 .catch(err => alert("Erro ao salvar confirmação. Tente novamente."));
 }
</script>
</body>
</html>
